<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearninCo - Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="login-container">
        <h1><span>|</span>Login</h1>

        <dialog id="meuModal">
        <h2 id="modalTitulo">Mensagem</h2>
        <p id="modalMensagem">Texto do alerta aqui...</p>
        <button id="fecharModal">Entendido</button>
        </dialog>
        
        <form onsubmit="return false;">
            <div class="input-group">
                <input id="gemail" type="email" placeholder="Insira seu Email" required>

            </div>
            
            <div class="input-group">
                <input id="seinha" type="password" placeholder="Insira sua senha" required>
                <button id="versenhaL" type="button">👀</button>
            </div>
            
            <button id="logar" type="submit">Entrar</button>
        </form>

        <div class="login-actions">
            <button id="esqueci">Esqueci minha senha</button>
            <button id="registrar">Registrar</button>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
