<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearninCo - Protótipo</title>
        <link rel="stylesheet" href="estilo.css">
</head>
<body>



    <aside id="barra-lateral">
        <h3>LearninCo Menu</h3>
        <button id="btn-novo-chat">+ Novo Chat</button>
        <br><br>
        <nav>
            <button id="aba-chat">💬 Chat Principal</button><br>
            <button id="aba-cronograma">⌛ Cronograma</button><br>  
            <button id="aba-biblioteca">📚 Minha Biblioteca</button><br>
            <button id="aba-progresso">📊 Meu Progresso</button><br>
        </nav>    
        <div>
        <button id="perfilsigma">Perfil</button>
    </div>
    </aside>

    <hr> <main>
        <h1>Protótipo de LearninCo</h1>
        <button id="btn-main">Voltar para Login</button>
        
        <br><br>

        <section id="config-aprendizado">
            <label for="modo-estudo">Método de explicação:</label>
            <select id="modo-estudo">
                <option value="facil">Me explique como se eu tivesse 5 anos</option>
                <option value="normal">Explicação padrão</option>
                <option value="simulado">Gerar perguntas de prova</option>
            </select>
        </section>

        <br>

        <section id="criar-conteudo">
            <input id="input-conteudo" placeholder="Insira o conteúdo desejado (Ex: Matéria X)">
            <button id="btn-gerar">Gerar Cronograma</button>
        </section>

        <br>

        <section id="area-chat">
            <label for="chats">Chats criados</label> 
            <select id="chats" name="emprego">
                <option value="teste1">Sei lá</option>
                <option value="teste2">Também não sei</option>
                <option value="teste3">Bora bill</option>
            </select>
            <button id="btn-acessar">Acessar Chat Antigo</button>
            
            <br><br>

            <textarea id="falar-combot" placeholder="Digite sua mensagem..." style="resize: none; width: 300px; height: 16px;"></textarea>
            <br>
            <button id="btn-midia">Mídia</button>
            <button id="btn-enviar">Enviar</button>
            <script src="principal.js"></script>
        </section>
    </main>
    
</body>
</html>
